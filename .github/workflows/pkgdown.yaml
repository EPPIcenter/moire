# Workflow derived from
# https://github.com/r-wasm/actions/tree/v3/examples/rwasm-binary-and-pkgdown-site.yml
# and https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch: {}

name: R WASM & pkgdown deploy

permissions: read-all

jobs:
  build-site:
    runs-on: ubuntu-latest
    concurrency:
      group: r-wasm-pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        shell: Rscript {0}
        run: |
          pkgdown::build_site_github_pages(
            new_process = FALSE,
            install = FALSE,
            dest_dir = "_site"
          )

      # Overlay Wasm CRAN-like repo into the same _site directory.
      # continue-on-error: docs still deploy if wasm/pak metadata flakes.
      - name: Build Wasm R packages
        id: rwasm
        continue-on-error: true
        uses: r-wasm/actions/build-rwasm@v3
        with:
          packages: "."
          repo-path: "_site"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"
          retention-days: 1

  deploy:
    if: github.event_name != 'pull_request'
    needs: [build-site]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
